<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table 3D by Sani</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    width: 100vw; height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,0,0.012) 2px, rgba(0,255,0,0.012) 4px);
    pointer-events: none;
    z-index: 999;
  }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 100;
    pointer-events: none;
  }
  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.7rem, 1.8vw, 1.1rem);
    letter-spacing: 0.3em;
    color: #39ff14;
    text-shadow: 0 0 20px #39ff14;
    padding: 14px 0 8px;
    pointer-events: none;
  }
  .controls {
    display: flex;
    gap: 8px;
    padding: 0 0 12px;
    pointer-events: all;
  }
  .controls button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    padding: 5px 16px;
    background: transparent;
    border: 1px solid #2a4a2a;
    color: #5a8a5a;
    cursor: pointer;
    text-transform: lowercase;
    transition: all 0.25s;
  }
  .controls button:hover { color: #39ff14; border-color: #39ff14; }
  .controls button.active {
    color: #0a0a0f;
    border-color: #39ff14;
    background: #39ff14;
    box-shadow: 0 0 18px #39ff14;
  }
  #hint {
    position: fixed;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.62rem;
    color: #2a5a2a;
    letter-spacing: 0.1em;
    pointer-events: none;
    z-index: 100;
  }
  #tooltip {
    position: fixed;
    bottom: 38px; left: 50%;
    transform: translateX(-50%);
    background: #0a1a0a;
    border: 1px solid #39ff14;
    padding: 6px 18px;
    font-size: 0.72rem;
    color: #39ff14;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s;
    z-index: 200;
    white-space: nowrap;
    box-shadow: 0 0 16px #39ff1433;
  }
  canvas { display: block; }
</style>
</head>
<body>

<div id="ui">
  <h1>Periodic Table 3D</h1>
  <div class="controls">
    <button id="btn-table"  class="active" onclick="setLayout('table')">table</button>
    <button id="btn-sphere" onclick="setLayout('sphere')">sphere</button>
    <button id="btn-helix"  onclick="setLayout('helix')">helix</button>
    <button id="btn-grid"   onclick="setLayout('grid')">grid</button>
  </div>
</div>

<div id="hint">drag to rotate · scroll to zoom · click an element</div>
<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

  {n:62,sym:'Sm',name:'Samarium',cat:'lanthanide',group:8,period:6},
  {n:63,sym:'Eu',name:'Europium',cat:'lanthanide',group:9,period:6},
  {n:64,sym:'Gd',name:'Gadolinium',cat:'lanthanide',group:10,period:6},
  {n:65,sym:'Tb',name:'Terbium',cat:'lanthanide',group:11,period:6},

  {n:67,sym:'Ho',name:'Holmium',cat:'lanthanide',group:13,period:6},

  {n:87,sym:'Fr',name:'Francium',cat:'alkali',group:1,period:7},
  {n:88,sym:'Ra',name:'Radium',cat:'alkaline',group:2,period:7},
  {n:89,sym:'Ac',name:'Actinium',cat:'actinide',group:3,period:7},
  {n:90,sym:'Th',name:'Thorium',cat:'actinide',group:4,period:7},
  {n:91,sym:'Pa',name:'Protactinium',cat:'actinide',group:5,period:7},
  {n:92,sym:'U',name:'Uranium',cat:'actinide',group:6,period:7},

  {n:94,sym:'Pu',name:'Plutonium',cat:'actinide',group:8,period:7},
  {n:95,sym:'Am',name:'Americium',cat:'actinide',group:9,period:7},
  {n:96,sym:'Cm',name:'Curium',cat:'actinide',group:10,period:7},
  {n:97,sym:'Bk',name:'Berkelium',cat:'actinide',group:11,period:7},
  {n:98,sym:'Cf',name:'Californium',cat:'actinide',group:12,period:7},
  {n:99,sym:'Es',name:'Einsteinium',cat:'actinide',group:13,period:7},
  {n:100,sym:'Fm',name:'Fermium',cat:'actinide',group:14,period:7},
  {n:101,sym:'Md',name:'Mendelevium',cat:'actinide',group:15,period:7},
  {n:102,sym:'No',name:'Nobelium',cat:'actinide',group:16,period:7},
  {n:103,sym:'Lr',name:'Lawrencium',cat:'actinide',group:17,period:7},
  {n:104,sym:'Rf',name:'Rutherfordium',cat:'transition',group:4,period:7},
  {n:105,sym:'Db',name:'Dubnium',cat:'transition',group:5,period:7},
  {n:106,sym:'Sg',name:'Seaborgium',cat:'transition',group:6,period:7},
  {n:107,sym:'Bh',name:'Bohrium',cat:'transition',group:7,period:7},
  {n:108,sym:'Hs',name:'Hassium',cat:'transition',group:8,period:7},
  {n:109,sym:'Mt',name:'Meitnerium',cat:'transition',group:9,period:7},
  {n:110,sym:'Ds',name:'Darmstadtium',cat:'transition',group:10,period:7},
  {n:111,sym:'Rg',name:'Roentgenium',cat:'transition',group:11,period:7},
  {n:112,sym:'Cn',name:'Copernicium',cat:'transition',group:12,period:7},
  {n:113,sym:'Nh',name:'Nihonium',cat:'post',group:13,period:7},
  {n:114,sym:'Fl',name:'Flerovium',cat:'post',group:14,period:7},
  {n:115,sym:'Mc',name:'Moscovium',cat:'post',group:15,period:7},
  {n:116,sym:'Lv',name:'Livermorium',cat:'post',group:16,period:7},
  {n:117,sym:'Ts',name:'Tennessine',cat:'halogen',group:17,period:7},
  {n:118,sym:'Og',name:'Oganesson',cat:'noble',group:18,period:7},
];

// ─── Category colours ─────────────────────────────────────────────────────────
const CAT_COLOR = {
  alkali:     0xff6b6b,
  alkaline:   0xffa94d,
  transition: 0x39ff14,
  post:       0x74c0fc,
  metalloid:  0xa9e34b,
  nonmetal:   0x66d9e8,
  halogen:    0xda77f2,
  noble:      0xff8787,
  lanthanide: 0xffd43b,
  actinide:   0xff922b,
};

// ─── Three.js setup ───────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0a0a0f);
document.body.appendChild(renderer.domElement);

const scene3 = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 5000);
camera.position.set(0, 0, 900);

// Soft ambient + directional
scene3.add(new THREE.AmbientLight(0xffffff, 0.4));
const dLight = new THREE.DirectionalLight(0x39ff14, 0.6);
dLight.position.set(1, 1, 2);
scene3.add(dLight);

// ─── Canvas texture helper ────────────────────────────────────────────────────
function makeTexture(el) {
  const W = 128, H = 128;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const hex = '#' + CAT_COLOR[el.cat].toString(16).padStart(6,'0');

  // bg
  ctx.fillStyle = 'rgba(8,16,8,0.92)';
  ctx.fillRect(0, 0, W, H);

  // border
  ctx.strokeStyle = hex;
  ctx.lineWidth = 3;
  ctx.strokeRect(2, 2, W-4, H-4);

  // number
  ctx.fillStyle = hex;
  ctx.globalAlpha = 0.7;
  ctx.font = '18px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(el.n, W/2, 26);

  // symbol
  ctx.globalAlpha = 1;
  ctx.font = 'bold 44px "Share Tech Mono", monospace';
  ctx.shadowColor = hex;
  ctx.shadowBlur = 12;
  ctx.fillText(el.sym, W/2, 76);

  // name
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 0.65;
  ctx.font = '13px "Share Tech Mono", monospace';
  const nameText = el.name.length > 11 ? el.name.slice(0,10)+'…' : el.name;
  ctx.fillText(nameText, W/2, 102);

  const tex = new THREE.CanvasTexture(cv);
  return tex;
}

// ─── Build meshes ─────────────────────────────────────────────────────────────
const geo = new THREE.PlaneGeometry(44, 44);
const meshes = ELEMENTS.map(el => {
  const mat = new THREE.MeshBasicMaterial({
    map: makeTexture(el),
    side: THREE.DoubleSide,
    transparent: true,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = el;
  scene3.add(mesh);
  return mesh;
});

// ─── Layout positions ─────────────────────────────────────────────────────────
const S = 48;

function tablePositions() {
  return ELEMENTS.map(el => {
    let col = el.group - 1;
    let row = el.period - 1;
    let z = 0;
    if (el.cat === 'lanthanide') { row = 8; col = el.n - 57 + 2; }
    if (el.cat === 'actinide')   { row = 9; col = el.n - 89 + 2; }
    const ox = -8.5 * S, oy = 4.5 * S;
    return new THREE.Vector3(ox + col * S, oy - row * S, z);
  });
}

function spherePositions() {
  const R = 280;
  return ELEMENTS.map((_, i) => {
    const total = ELEMENTS.length;
    const phi   = Math.acos(1 - 2*(i+0.5)/total);
    const theta = Math.PI*(1+Math.sqrt(5))*i;
    return new THREE.Vector3(
      R * Math.sin(phi) * Math.cos(theta),
      R * Math.cos(phi),
      R * Math.sin(phi) * Math.sin(theta)
    );
  });
}

function helixPositions() {
  const R = 200, H = 480;
  return ELEMENTS.map((_, i) => {
    const t = (i / (ELEMENTS.length-1)) * Math.PI * 6;
    return new THREE.Vector3(
      R * Math.cos(t),
      H/2 - (i/(ELEMENTS.length-1))*H,
      R * Math.sin(t)
    );
  });
}

function gridPositions() {
  const cols = 13;
  return ELEMENTS.map((_, i) => {
    const c = i % cols, r = Math.floor(i / cols);
    const totalCols = cols, totalRows = Math.ceil(ELEMENTS.length/cols);
    return new THREE.Vector3(
      (c - totalCols/2 + 0.5) * S,
      (totalRows/2 - r - 0.5) * S,
      0
    );
  });
}

// ─── Animation state ──────────────────────────────────────────────────────────
let targets = tablePositions();
const current = meshes.map(() => new THREE.Vector3());

// set initial positions without lerp
tablePositions().forEach((p, i) => {
  meshes[i].position.copy(p);
  current[i].copy(p);
});

function setLayout(name) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + name).classList.add('active');
  if (name === 'table')  targets = tablePositions();
  if (name === 'sphere') targets = spherePositions();
  if (name === 'helix')  targets = helixPositions();
  if (name === 'grid')   targets = gridPositions();
}

// ─── Orbit controls (manual, no import needed) ────────────────────────────────
const pivot = new THREE.Group();
scene3.add(pivot);
meshes.forEach(m => pivot.add(m));

let isDragging = false;
let lastX = 0, lastY = 0;
let rotX = 0, rotY = 0;
let velX = 0, velY = 0;
let zoom = 900;

const canvas = renderer.domElement;

canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; velX = velY = 0; });
window.addEventListener('mouseup',   () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  velX = dy * 0.005;
  velY = dx * 0.005;
  rotX += velX;
  rotY += velY;
  lastX = e.clientX; lastY = e.clientY;
});

canvas.addEventListener('wheel', e => {
  zoom += e.deltaY * 0.8;
  zoom = Math.max(200, Math.min(2000, zoom));
}, { passive: true });

// Touch
let t0 = null, t1 = null, lastDist = 0;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    velX = velY = 0;
  }
  if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastDist = Math.sqrt(dx*dx+dy*dy);
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    velX = dy * 0.005; velY = dx * 0.005;
    rotX += velX; rotY += velY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    zoom -= (dist - lastDist) * 2;
    zoom = Math.max(200, Math.min(2000, zoom));
    lastDist = dist;
  }
}, { passive: true });
canvas.addEventListener('touchend', () => { isDragging = false; }, { passive: true });

// ─── Raycasting for click tooltip ─────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('click', e => {
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length) {
    const el = hits[0].object.userData;
    tooltip.textContent = `${el.n} — ${el.name} (${el.sym})`;
    tooltip.style.opacity = '1';
    setTimeout(() => tooltip.style.opacity = '0', 3000);
  }
});

// ─── Render loop ──────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  // Inertia
  if (!isDragging) {
    velX *= 0.94; velY *= 0.94;
    rotX += velX; rotY += velY;
  }

  pivot.rotation.x = rotX;
  pivot.rotation.y = rotY;
  camera.position.z += (zoom - camera.position.z) * 0.08;

  // Lerp to targets
  meshes.forEach((m, i) => {
    m.position.lerp(targets[i], 0.06);
    // face camera when in table/grid
    m.lookAt(pivot.worldToLocal(camera.position.clone()));
  });

  renderer.render(scene3, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
